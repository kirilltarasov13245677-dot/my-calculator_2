<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <img class="logo" src="logo/free-icon-calculator-223737.png" alt="logo">
            <a class="header-links" href="/home-page.html">Главная</a>
            <a class="header-links" href="/about.html">О сайте</a>
            <a class="header-links" href="/contacts.html">Контакты</a>
    </header>

    <div class="calc">
        <div class="calc-screen">
            <p>0</p>
        </div>
        <div class="buttons">
            <div class="btn  ac bg-grey">ac</div>
            <div class="btn olus-minus bg-grey">+/-</div>
            <div class="btn percent bg-grey">%</div>
            <div class="btn division bg-orange">÷</div>

            <div class="btn seven">7</div>
            <div class="btn eight">8</div>
            <div class="btn nine">9</div>
            <div class="btn myltiply bg-orange">×</div>

            <div class="btn four">4</div>
            <div class="btn five">5</div>
            <div class="btn six">6</div>
            <div class="btn minus bg-orange">-</div>

            <div class="btn one">1</div>
            <div class="btn two">2</div>
            <div class="btn three">3</div>
            <div class="btn plus bg-orange">+</div>

            <div class="btn zero">0</div>
            <div class="btn bot">.</div>
            <div class="btn equal bg-orange">=</div>

        </div>
    </div>

    <footer class="footer">
        <div class="wrapper">
            <p class="prav"><b>Авторские права</b> - Кирилл Тарасов 9 "А"</p>
            <a class="icons" href=""><img src="logo/icons8-telegram-app-24.png" alt=""></a>
            <a class="icons" href=""><img src="logo/icons8-whatsapp-24.png" alt=""></a>
            <a class="icons" href=""><img src="logo/icons8-twitter-24.png" alt=""></a>
            <a class="icons" href=""><img src="logo/icons8-facebook-24.png" alt=""></a>
            <a class="icons" href=""><img src="logo/icons8-instagram-24.png" alt=""></a>
        </div>
    </footer>




    <script src="script.js"></script>
</body>
</html>
